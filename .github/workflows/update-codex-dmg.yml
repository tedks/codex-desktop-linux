name: Update Codex.dmg pin

# OpenAI serves the latest Codex.dmg from a version-less URL, so the sha256
# pinned in nix/codex-desktop.nix goes stale whenever they republish. This
# workflow refetches the DMG daily, re-pins the hash + version when it changes,
# validates the new DMG still builds with the existing extraction logic, and
# opens a PR with the details.

on:
  schedule:
    # Daily at 06:17 UTC. Off-the-hour minute to avoid the cron stampede.
    - cron: "17 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-codex-dmg
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Refresh hash + version
        id: refresh
        run: ./ci/refresh-codex-dmg.sh

      - name: Validate build with new DMG
        id: build
        # Only attempt a build if something actually changed.
        if: steps.refresh.outputs.changed == 'true'
        run: |
          set -o pipefail
          echo "Building .#codex-desktop to validate the new DMG..."
          if nix build --no-link --print-build-logs .#codex-desktop 2>&1 | tee build.log; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "Build succeeded."
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "Build FAILED — extraction logic likely needs manual attention."
          fi

      - name: Compose PR body
        id: body
        if: steps.refresh.outputs.changed == 'true'
        env:
          OLD_HASH: ${{ steps.refresh.outputs.old_hash }}
          NEW_HASH: ${{ steps.refresh.outputs.new_hash }}
          OLD_VERSION: ${{ steps.refresh.outputs.old_version }}
          NEW_VERSION: ${{ steps.refresh.outputs.new_version }}
          BUILD_RESULT: ${{ steps.build.outputs.result }}
        run: |
          # Design choice: we always open the PR, even when the validation
          # build fails. A failed build almost always means the DMG's internal
          # layout changed (so the asar/APFS extraction in nix/codex-desktop.nix
          # needs manual updating), not just that the hash drifted — and that is
          # exactly the case a human most needs to see. We mark it loudly so a
          # red build is never silently merged.
          if [ "$BUILD_RESULT" = "success" ]; then
            build_line="✅ \`nix build --no-link .#codex-desktop\` **succeeded** with the new DMG."
          else
            build_line="❌ \`nix build --no-link .#codex-desktop\` **FAILED** with the new DMG. **Do not merge as-is** — the DMG's internal layout has probably changed and the extraction logic in \`nix/codex-desktop.nix\` needs manual updating. See the workflow logs (\"Validate build with new DMG\" step) for details."
          fi

          {
            echo "## Automated Codex.dmg re-pin"
            echo
            echo "OpenAI republished \`Codex.dmg\` at the version-less URL, so the"
            echo "pinned hash in \`nix/codex-desktop.nix\` was stale. This PR updates it."
            echo
            echo "| field | old | new |"
            echo "| --- | --- | --- |"
            echo "| version | \`${OLD_VERSION}\` | \`${NEW_VERSION}\` |"
            echo "| hash | \`${OLD_HASH}\` | \`${NEW_HASH}\` |"
            echo
            echo "$build_line"
            echo
            echo "Generated by \`.github/workflows/update-codex-dmg.yml\` via \`ci/refresh-codex-dmg.sh\`."
            echo
            echo "🤖 Generated with [Claude Code](https://claude.com/claude-code)"
          } > pr-body.md

          echo "Wrote PR body:"
          cat pr-body.md

      - name: Open / update pull request
        if: steps.refresh.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ci/codex-dmg-auto-update
          base: main
          commit-message: |
            codex-desktop: re-pin Codex.dmg (${{ steps.refresh.outputs.old_version }} -> ${{ steps.refresh.outputs.new_version }})

            Automated re-pin of the version-less Codex.dmg URL.
            hash ${{ steps.refresh.outputs.old_hash }} -> ${{ steps.refresh.outputs.new_hash }}
            nix build result: ${{ steps.build.outputs.result }}

            Co-Authored-By: Claude Opus 4.7 (1M context) <noreply@anthropic.com>
          title: "codex-desktop: re-pin Codex.dmg (${{ steps.refresh.outputs.new_version }})"
          body-path: pr-body.md
          labels: |
            automated
            dependencies
          delete-branch: true
          add-paths: |
            nix/codex-desktop.nix
